<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d4ff;
        }
        #gameCanvas {
            border: 3px solid #00d4ff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            background: #000;
        }
        .info {
            color: #fff;
            margin-top: 15px;
            font-size: 18px;
        }
        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
        }
        .btn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 18px;
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🛩️ 飞机大战 🛩️</h1>
        <canvas id="gameCanvas" width="480" height="600"></canvas>
        <div class="info">
            <span>得分: <span id="score">0</span></span>
            <span style="margin-left: 30px;">生命: <span id="lives">3</span></span>
            <span style="margin-left: 30px;">最高分: <span id="highScore">0</span></span>
        </div>
        <div class="controls">
            操作: ← → 或 A D 移动 | 空格键 发射子弹 | P 暂停
        </div>
        <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const highScoreEl = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');

        // 游戏状态
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let highScore = localStorage.getItem('highScore') || 0;
        highScoreEl.textContent = highScore;

        // 玩家飞机
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 80,
            width: 50,
            height: 60,
            speed: 7,
            color: '#00d4ff'
        };

        // 子弹数组
        let bullets = [];
        const bulletSpeed = 10;
        let canShoot = true;
        let shootCooldown = 150;

        // 敌机数组
        let enemies = [];
        let enemySpeed = 2;
        let enemySpawnRate = 60;
        let frameCount = 0;

        // 爆炸效果
        let explosions = [];

        // 星星背景
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 0.5
            });
        }

        // 键盘状态
        const keys = {
            left: false,
            right: false,
            shoot: false
        };

        // 事件监听
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ') {
                e.preventDefault();
                keys.shoot = true;
            }
            if (e.key === 'p' || e.key === 'P') togglePause();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
            if (e.key === ' ') keys.shoot = false;
        });

        startBtn.addEventListener('click', startGame);

        function startGame() {
            gameRunning = true;
            gamePaused = false;
            score = 0;
            lives = 3;
            bullets = [];
            enemies = [];
            explosions = [];
            player.x = canvas.width / 2 - 25;
            player.y = canvas.height - 80;
            enemySpeed = 2;
            enemySpawnRate = 60;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            startBtn.textContent = '重新开始';
            gameLoop();
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            if (!gamePaused) gameLoop();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);

            // 飞机主体
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -player.height / 2);
            ctx.lineTo(-player.width / 2, player.height / 2);
            ctx.lineTo(-player.width / 4, player.height / 3);
            ctx.lineTo(0, player.height / 2);
            ctx.lineTo(player.width / 4, player.height / 3);
            ctx.lineTo(player.width / 2, player.height / 2);
            ctx.closePath();
            ctx.fill();

            // 飞机发光效果
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.fill();

            // 驾驶舱
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 8, 15, 0, 0, Math.PI * 2);
            ctx.fill();

            // 引擎火焰
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(-10, player.height / 2);
            ctx.lineTo(0, player.height / 2 + 15 + Math.random() * 10);
            ctx.lineTo(10, player.height / 2);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawBullets() {
            bullets.forEach(bullet => {
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.fillRect(bullet.x - 2, bullet.y, 4, 15);
                ctx.shadowBlur = 0;
            });
        }

        function drawEnemies() {
            enemies.forEach(enemy => {
                ctx.save();
                ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);

                // 敌机主体
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.moveTo(0, enemy.height / 2);
                ctx.lineTo(-enemy.width / 2, -enemy.height / 2);
                ctx.lineTo(-enemy.width / 4, -enemy.height / 3);
                ctx.lineTo(0, -enemy.height / 2);
                ctx.lineTo(enemy.width / 4, -enemy.height / 3);
                ctx.lineTo(enemy.width / 2, -enemy.height / 2);
                ctx.closePath();
                ctx.fill();

                // 敌机发光
                ctx.shadowColor = enemy.color;
                ctx.shadowBlur = 10;
                ctx.fill();

                ctx.restore();
            });
        }

        function drawExplosions() {
            explosions.forEach((exp, index) => {
                ctx.beginPath();
                ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${100 + exp.radius * 5}, 0, ${exp.alpha})`;
                ctx.fill();

                exp.radius += 3;
                exp.alpha -= 0.05;

                if (exp.alpha <= 0) {
                    explosions.splice(index, 1);
                }
            });
        }

        function drawStars() {
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            ctx.globalAlpha = 1;
        }

        function updatePlayer() {
            if (keys.left && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys.right && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if (keys.shoot && canShoot) {
                shoot();
            }
        }

        function shoot() {
            bullets.push({
                x: player.x + player.width / 2,
                y: player.y
            });
            canShoot = false;
            setTimeout(() => canShoot = true, shootCooldown);
        }

        function updateBullets() {
            bullets = bullets.filter(bullet => {
                bullet.y -= bulletSpeed;
                return bullet.y > 0;
            });
        }

        function spawnEnemy() {
            const colors = ['#ff4444', '#ff8800', '#ff00ff', '#00ff00'];
            const width = 40 + Math.random() * 20;
            enemies.push({
                x: Math.random() * (canvas.width - width),
                y: -50,
                width: width,
                height: width * 0.8,
                speed: enemySpeed + Math.random() * 2,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        function updateEnemies() {
            frameCount++;
            if (frameCount % enemySpawnRate === 0) {
                spawnEnemy();
            }

            enemies = enemies.filter(enemy => {
                enemy.y += enemy.speed;

                // 检测与玩家碰撞
                if (checkCollision(player, enemy)) {
                    lives--;
                    livesEl.textContent = lives;
                    explosions.push({ x: player.x + player.width / 2, y: player.y + player.height / 2, radius: 10, alpha: 1 });

                    if (lives <= 0) {
                        gameOver();
                    }
                    return false;
                }

                // 检测与子弹碰撞
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];
                    if (bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
                        bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {
                        bullets.splice(i, 1);
                        explosions.push({ x: enemy.x + enemy.width / 2, y: enemy.y + enemy.height / 2, radius: 10, alpha: 1 });
                        score += 10;
                        scoreEl.textContent = score;

                        // 增加难度
                        if (score % 100 === 0) {
                            enemySpeed += 0.2;
                            if (enemySpawnRate > 20) enemySpawnRate -= 2;
                        }
                        return false;
                    }
                }

                return enemy.y < canvas.height;
            });
        }

        function checkCollision(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highScore', highScore);
                highScoreEl.textContent = highScore;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff4444';
            ctx.font = 'bold 48px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 30);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Microsoft YaHei';
            ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 20);

            if (score >= highScore) {
                ctx.fillStyle = '#ffff00';
                ctx.fillText('🎉 新纪录! 🎉', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function drawPauseScreen() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 48px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#fff';
            ctx.font = '20px Microsoft YaHei';
            ctx.fillText('按 P 继续', canvas.width / 2, canvas.height / 2 + 40);
        }

        function gameLoop() {
            if (!gameRunning) return;
            if (gamePaused) {
                drawPauseScreen();
                return;
            }

            // 清空画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星背景
            drawStars();

            // 更新和绘制
            updatePlayer();
            updateBullets();
            updateEnemies();

            drawPlayer();
            drawBullets();
            drawEnemies();
            drawExplosions();

            requestAnimationFrame(gameLoop);
        }

        // 初始画面
        function drawStartScreen() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawStars();

            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 36px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('🛩️ 飞机大战 🛩️', canvas.width / 2, canvas.height / 2 - 50);

            ctx.fillStyle = '#fff';
            ctx.font = '20px Microsoft YaHei';
            ctx.fillText('点击下方按钮开始游戏', canvas.width / 2, canvas.height / 2 + 20);
        }

        drawStartScreen();
    </script>
</body>
</html>
